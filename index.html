<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TF Signboard - テストフライト用カンペアプリ</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Helvetica Neue', 'Arial', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* スクロールバー非表示、ピンチズーム等の誤動作防止 */
    body {
      touch-action: manipulation;
    }
    /* 全画面表示時に改行を防ぎ、文字サイズ調整の基準にするための設定 */
    .nowrap-line {
      white-space: nowrap;
      display: block;
      text-align: center;
      line-height: 1.2;
    }
  </style>
</head>
<body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-50 min-h-screen transition-colors duration-200">

  <!-- 編集・操作パネル画面 -->
  <div id="editor-panel" class="max-w-2xl mx-auto px-4 py-6 pb-24">
    <!-- ヘッダー -->
    <header class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-xl font-bold tracking-wider text-indigo-600 dark:text-indigo-400 flex items-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          TF SIGNBOARD
        </h1>
        <p class="text-xs text-zinc-500 dark:text-zinc-400 mt-1">撮影用データ自動テンプレート化アプリ</p>
      </div>
      <!-- テーマ切り替えボタン -->
      <button id="theme-toggle" class="p-2.5 rounded-xl bg-zinc-200 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 hover:scale-105 active:scale-95 transition-transform">
        <!-- 太陽アイコン -->
        <svg id="theme-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
        <!-- 月アイコン -->
        <svg id="theme-moon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
    </header>

    <div class="space-y-5">
      <!-- セクション1: 基本情報（日付 & TF種別） -->
      <section class="bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm border border-zinc-100 dark:border-zinc-800/80">
        <h2 class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-3">セクション1: 基本情報（日付・TF）</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- 日付入力 -->
          <div>
            <label class="block text-sm font-medium text-zinc-600 dark:text-zinc-300 mb-1.5">試験日</label>
            <input type="date" id="tf-date" class="w-full p-3 rounded-xl bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
          </div>
          <!-- TF種別 & 回数 -->
          <div>
            <label class="block text-sm font-medium text-zinc-600 dark:text-zinc-300 mb-1.5">テストフライト回数・種別</label>
            <div class="flex gap-2">
              <!-- TF種別トグル -->
              <div class="flex rounded-xl bg-zinc-100 dark:bg-zinc-950 p-1 border border-zinc-200 dark:border-zinc-800">
                <button type="button" onclick="setTfType('GTF')" id="btn-gtf" class="px-3.5 py-2 text-xs font-bold rounded-lg transition-all">GTF</button>
                <button type="button" onclick="setTfType('KTF')" id="btn-ktf" class="px-3.5 py-2 text-xs font-bold rounded-lg transition-all">KTF</button>
              </div>
              <!-- TF回数カウンター -->
              <div class="flex-1 flex items-center justify-between rounded-xl bg-zinc-100 dark:bg-zinc-950 p-1 border border-zinc-200 dark:border-zinc-800">
                <button type="button" onclick="changeTfCount(-1)" class="w-10 h-10 flex items-center justify-center text-lg font-bold text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg transition-colors">-</button>
                <span id="tf-count-display" class="font-bold text-sm tracking-wide">1st</span>
                <button type="button" onclick="changeTfCount(1)" class="w-10 h-10 flex items-center justify-center text-lg font-bold text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg transition-colors">+</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- セクション2: 走行/飛行試験 -->
      <section class="bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm border border-zinc-100 dark:border-zinc-800/80">
        <h2 class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-3">セクション2: 試験内容 & 回数</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- 試験種別 -->
          <div>
            <label class="block text-sm font-medium text-zinc-600 dark:text-zinc-300 mb-1.5">試験種類</label>
            <div class="grid grid-cols-2 gap-2 rounded-xl bg-zinc-100 dark:bg-zinc-950 p-1 border border-zinc-200 dark:border-zinc-800">
              <button type="button" onclick="setTestType('走行試験')" id="btn-test-run" class="py-2.5 text-xs font-bold rounded-lg transition-all">走行試験</button>
              <button type="button" onclick="setTestType('飛行試験')" id="btn-test-flight" class="py-2.5 text-xs font-bold rounded-lg transition-all">飛行試験</button>
            </div>
          </div>
          <!-- 走行/飛行回数 (k回目) -->
          <div>
            <label class="block text-sm font-medium text-zinc-600 dark:text-zinc-300 mb-1.5">試験回数</label>
            <div class="flex items-center justify-between rounded-xl bg-zinc-100 dark:bg-zinc-950 p-1 border border-zinc-200 dark:border-zinc-800">
              <button type="button" onclick="changeRunCount(-1)" class="w-12 h-10 flex items-center justify-center text-xl font-bold text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg transition-colors">-</button>
              <span id="run-count-display" class="font-bold text-base">1回目</span>
              <button type="button" onclick="changeRunCount(1)" class="w-12 h-10 flex items-center justify-center text-xl font-bold text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg transition-colors">+</button>
            </div>
          </div>
        </div>
      </section>

      <!-- セクション3: 後方の風 / 前方の風 -->
      <section class="bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm border border-zinc-100 dark:border-zinc-800/80 space-y-4">
        <h2 class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-1">セクション3: 風況データ</h2>
        
        <!-- 後方の風 -->
        <div class="p-3.5 bg-zinc-50 dark:bg-zinc-950/50 rounded-xl border border-zinc-100 dark:border-zinc-800/50">
          <h3 class="text-sm font-bold text-indigo-500 dark:text-indigo-400 mb-2">後方の風</h3>
          <div class="space-y-3">
            <!-- 風向き選択 -->
            <div>
              <span class="block text-xs text-zinc-400 dark:text-zinc-500 mb-1">風向</span>
              <div class="flex flex-wrap gap-1" id="rear-dir-container"></div>
            </div>
            <!-- 風速タイプ -->
            <div>
              <span class="block text-xs text-zinc-400 dark:text-zinc-500 mb-1">風速タイプ</span>
              <div class="grid grid-cols-3 gap-2">
                <button type="button" onclick="setWindType('rear', 'none')" id="btn-rear-none" class="py-2 text-xs font-bold rounded-lg border transition-all">無風</button>
                <button type="button" onclick="setWindType('rear', 'light')" id="btn-rear-light" class="py-2 text-xs font-bold rounded-lg border transition-all">微風</button>
                <button type="button" onclick="setWindType('rear', 'spec')" id="btn-rear-spec" class="py-2 text-xs font-bold rounded-lg border transition-all">風速指定</button>
              </div>
            </div>
            <!-- 風速詳細 (指定時のみ表示) -->
            <div id="rear-speed-picker" class="hidden flex items-center gap-3">
              <span class="text-xs text-zinc-400 dark:text-zinc-500">風速値:</span>
              <div class="flex items-center gap-1 bg-zinc-100 dark:bg-zinc-900 rounded-lg p-1">
                <button type="button" onclick="adjustSpeed('rear', -0.5)" class="px-2 py-1 text-xs font-bold text-zinc-500 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded">-0.5</button>
                <button type="button" onclick="adjustSpeed('rear', -0.1)" class="px-2 py-1 text-xs font-bold text-zinc-500 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded">-0.1</button>
                <input type="number" id="rear-speed-val" step="0.1" min="0" value="1.0" oninput="updateOutput()" class="w-16 text-center bg-transparent border-none text-sm font-bold focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                <span class="text-xs font-bold pr-2">m/s</span>
                <button type="button" onclick="adjustSpeed('rear', 0.1)" class="px-2 py-1 text-xs font-bold text-zinc-500 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded">+0.1</button>
                <button type="button" onclick="adjustSpeed('rear', 0.5)" class="px-2 py-1 text-xs font-bold text-zinc-500 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded">+0.5</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 前方の風 -->
        <div class="p-3.5 bg-zinc-50 dark:bg-zinc-950/50 rounded-xl border border-zinc-100 dark:border-zinc-800/50">
          <h3 class="text-sm font-bold text-emerald-500 dark:text-emerald-400 mb-2">前方の風</h3>
          <div class="space-y-3">
            <!-- 風向き選択 -->
            <div>
              <span class="block text-xs text-zinc-400 dark:text-zinc-500 mb-1">風向</span>
              <div class="flex flex-wrap gap-1" id="front-dir-container"></div>
            </div>
            <!-- 風速タイプ -->
            <div>
              <span class="block text-xs text-zinc-400 dark:text-zinc-500 mb-1">風速タイプ</span>
              <div class="grid grid-cols-3 gap-2">
                <button type="button" onclick="setWindType('front', 'none')" id="btn-front-none" class="py-2 text-xs font-bold rounded-lg border transition-all">無風</button>
                <button type="button" onclick="setWindType('front', 'light')" id="btn-front-light" class="py-2 text-xs font-bold rounded-lg border transition-all">微風</button>
                <button type="button" onclick="setWindType('front', 'spec')" id="btn-front-spec" class="py-2 text-xs font-bold rounded-lg border transition-all">風速指定</button>
              </div>
            </div>
            <!-- 風速詳細 (指定時のみ表示) -->
            <div id="front-speed-picker" class="hidden flex items-center gap-3">
              <span class="text-xs text-zinc-400 dark:text-zinc-500">風速値:</span>
              <div class="flex items-center gap-1 bg-zinc-100 dark:bg-zinc-900 rounded-lg p-1">
                <button type="button" onclick="adjustSpeed('front', -0.5)" class="px-2 py-1 text-xs font-bold text-zinc-500 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded">-0.5</button>
                <button type="button" onclick="adjustSpeed('front', -0.1)" class="px-2 py-1 text-xs font-bold text-zinc-500 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded">-0.1</button>
                <input type="number" id="front-speed-val" step="0.1" min="0" value="1.0" oninput="updateOutput()" class="w-16 text-center bg-transparent border-none text-sm font-bold focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                <span class="text-xs font-bold pr-2">m/s</span>
                <button type="button" onclick="adjustSpeed('front', 0.1)" class="px-2 py-1 text-xs font-bold text-zinc-500 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded">+0.1</button>
                <button type="button" onclick="adjustSpeed('front', 0.5)" class="px-2 py-1 text-xs font-bold text-zinc-500 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded">+0.5</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- プレビュー＆全画面起動エリア -->
      <section class="bg-gradient-to-tr from-indigo-50 to-emerald-50 dark:from-indigo-950/30 dark:to-emerald-950/30 p-5 rounded-2xl border border-indigo-100 dark:border-indigo-900/50">
        <h2 class="text-xs font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-wider mb-2">出力プレビュー</h2>
        <div id="preview-box" class="bg-white dark:bg-zinc-900 p-4 rounded-xl border border-zinc-200 dark:border-zinc-800 text-center font-bold tracking-wide leading-relaxed min-h-[120px] flex flex-col justify-center text-lg select-all">
          <!-- JSでここにリアルタイム表示 -->
        </div>
        
        <div class="mt-4">
          <button type="button" onclick="enterSignboardMode()" class="w-full py-4 px-6 rounded-xl bg-gradient-to-r from-indigo-600 to-indigo-700 dark:from-indigo-500 dark:to-indigo-600 text-white font-extrabold text-base tracking-widest shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
            全画面表示（カンペモード）にする
          </button>
          <p class="text-center text-xs text-zinc-500 dark:text-zinc-400 mt-2">※全画面中はスマートフォンを横にすると、さらに大きく撮影できます。</p>
        </div>
      </section>
    </div>
  </div>

  <!-- 全画面モード（カンペ）オーバーレイ -->
  <div id="signboard-overlay" class="hidden fixed inset-0 z-50 bg-white dark:bg-black flex flex-col justify-between p-4 select-none">
    
    <!-- 上部控えめなコントロールバー (カメラ撮影を邪魔しない位置) -->
    <div class="flex justify-between items-center w-full z-10">
      <!-- 画面内のクイック戻るボタン -->
      <button type="button" onclick="exitSignboardMode()" class="px-4 py-2 rounded-lg bg-zinc-200/50 dark:bg-zinc-800/50 hover:bg-zinc-200 dark:hover:bg-zinc-800 text-xs font-bold backdrop-blur-sm transition-colors text-zinc-700 dark:text-zinc-300">
        ← 戻る
      </button>

      <!-- カメラ用・背景反転スイッチ (撮影の露出に合わせてその場で白/黒反転) -->
      <button type="button" onclick="toggleSignboardTheme()" class="p-2 rounded-lg bg-zinc-200/50 dark:bg-zinc-800/50 hover:bg-zinc-200 dark:hover:bg-zinc-800 text-xs font-bold backdrop-blur-sm transition-colors text-zinc-700 dark:text-zinc-300">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
      </button>
    </div>

    <!-- カンペテキスト表示領域 -->
    <div id="signboard-text-container" class="flex-1 flex items-center justify-center w-full h-full overflow-hidden" onclick="exitSignboardMode()">
      <div id="signboard-text-wrapper" class="font-extrabold tracking-wide text-zinc-950 dark:text-white leading-none text-center transition-all duration-75">
        <!-- JSで改行なし(nowrap)に生成される行がここに挿入され、縮小計算されます -->
      </div>
    </div>

    <!-- 下部: 一時的に出る操作ヒント -->
    <div id="signboard-tip" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-center text-[10px] text-zinc-400 dark:text-zinc-500 pointer-events-none transition-opacity duration-1000">
      タップで編集画面に戻ります
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    // --- データ構造・ステート管理 ---
    const state = {
      dateStr: '',       // YYYY-MM-DD
      tfType: 'GTF',     // GTF or KTF
      tfCount: 2,        // 1stなら1, 2ndなら2 ...
      testType: '走行試験', // 走行試験 or 飛行試験
      runCount: 1,       // 走行/飛行回数(1回目...)
      rearWind: {
        dir: '右前',
        type: 'light',   // none(無風), light(微風), spec(風速指定)
        speed: 1.5       // 浮動小数点
      },
      frontWind: {
        dir: '無風',
        type: 'none',
        speed: 0.0
      }
    };

    const windDirections = ['前', '右', '左', '右前', '右後ろ', '左前', '左後ろ', '後ろ'];

    // --- 初期起動セットアップ ---
    window.addEventListener('DOMContentLoaded', () => {
      // 1. 日付を本日に設定
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      state.dateStr = `${yyyy}-${mm}-${dd}`;
      document.getElementById('tf-date').value = state.dateStr;
      document.getElementById('tf-date').addEventListener('change', (e) => {
        state.dateStr = e.target.value;
        updateOutput();
      });

      // 2. 風向セレクタを組み立て
      buildWindDirections('rear');
      buildWindDirections('front');

      // 3. テーマ初期適用
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
      updateThemeButtons();

      // 4. UI状態初期描画
      syncUiState();
      updateOutput();

      // テーマスイッチの監視
      document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    });

    // --- テーマ制御 ---
    function toggleTheme() {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
      updateThemeButtons();
    }

    function updateThemeButtons() {
      const sun = document.getElementById('theme-sun');
      const moon = document.getElementById('theme-moon');
      if (document.documentElement.classList.contains('dark')) {
        sun.classList.remove('hidden');
        moon.classList.add('hidden');
      } else {
        sun.classList.add('hidden');
        moon.classList.remove('hidden');
      }
    }

    // --- カウンター & トグル操作ロジック ---
    function setTfType(type) {
      state.tfType = type;
      syncUiState();
      updateOutput();
    }

    function changeTfCount(amount) {
      state.tfCount = Math.max(1, Math.min(30, state.tfCount + amount));
      syncUiState();
      updateOutput();
    }

    function setTestType(type) {
      state.testType = type;
      syncUiState();
      updateOutput();
    }

    function changeRunCount(amount) {
      state.runCount = Math.max(1, Math.min(100, state.runCount + amount));
      syncUiState();
      updateOutput();
    }

    function getOrdinal(n) {
      if (n === 1) return '1st';
      if (n === 2) return '2nd';
      if (n === 3) return '3rd';
      return `${n}th`;
    }

    // --- 風向ボタンの動的配置 ---
    function buildWindDirections(target) {
      const container = document.getElementById(`${target}-dir-container`);
      container.innerHTML = '';
      
      windDirections.forEach(dir => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = dir;
        btn.id = `btn-${target}-dir-${dir}`;
        btn.className = "px-2.5 py-1.5 text-xs font-semibold rounded-lg border transition-all text-zinc-600 dark:text-zinc-300 border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-900";
        btn.onclick = () => selectWindDirection(target, dir);
        container.appendChild(btn);
      });
    }

    function selectWindDirection(target, dir) {
      state[`${target}Wind`].dir = dir;
      // もし風向を選択したときに風速指定が「無風」なら、親切のために「微風」に自動切り替え
      if (state[`${target}Wind`].type === 'none') {
        state[`${target}Wind`].type = 'light';
      }
      syncUiState();
      updateOutput();
    }

    function setWindType(target, type) {
      state[`${target}Wind`].type = type;
      if (type === 'none') {
        state[`${target}Wind`].dir = '無風';
      } else if (state[`${target}Wind`].dir === '無風') {
        // 微風・指定に切り替えたときはデフォルトで右前などに
        state[`${target}Wind`].dir = '右前';
      }
      syncUiState();
      updateOutput();
    }

    function adjustSpeed(target, delta) {
      const input = document.getElementById(`${target}-speed-val`);
      let val = parseFloat(input.value) || 0;
      val = Math.max(0, parseFloat((val + delta).toFixed(1)));
      input.value = val;
      state[`${target}Wind`].speed = val;
      updateOutput();
    }

    // --- UI同期 ---
    function syncUiState() {
      // 1. TF種別
      const isGtf = state.tfType === 'GTF';
      toggleButtonActive('btn-gtf', isGtf);
      toggleButtonActive('btn-ktf', !isGtf);

      // TF回数表示
      document.getElementById('tf-count-display').textContent = getOrdinal(state.tfCount);

      // 2. 試験種別
      const isRun = state.testType === '走行試験';
      toggleButtonActive('btn-test-run', isRun);
      toggleButtonActive('btn-test-flight', !isRun);

      // 試験回数表示
      document.getElementById('run-count-display').textContent = `${state.runCount}回目`;

      // 3. 風況同期 (後方)
      const rType = state.rearWind.type;
      toggleButtonActive('btn-rear-none', rType === 'none');
      toggleButtonActive('btn-rear-light', rType === 'light');
      toggleButtonActive('btn-rear-spec', rType === 'spec');
      document.getElementById('rear-speed-picker').style.display = rType === 'spec' ? 'flex' : 'none';

      // 4. 風況同期 (前方)
      const fType = state.frontWind.type;
      toggleButtonActive('btn-front-none', fType === 'none');
      toggleButtonActive('btn-front-light', fType === 'light');
      toggleButtonActive('btn-front-spec', fType === 'spec');
      document.getElementById('front-speed-picker').style.display = fType === 'spec' ? 'flex' : 'none';

      // 風向きアクティブ適用
      windDirections.forEach(dir => {
        const isRearAct = (state.rearWind.dir === dir && state.rearWind.type !== 'none');
        const isFrontAct = (state.frontWind.dir === dir && state.frontWind.type !== 'none');
        toggleButtonActive(`btn-rear-dir-${dir}`, isRearAct);
        toggleButtonActive(`btn-front-dir-${dir}`, isFrontAct);
      });
    }

    function toggleButtonActive(id, isActive) {
      const btn = document.getElementById(id);
      if (!btn) return;
      if (isActive) {
        btn.className = btn.className
          .replace(/bg-[^\s]+/g, '')
          .replace(/border-[^\s]+/g, '')
          .replace(/text-[^\s]+/g, '');
        btn.classList.add('bg-indigo-600', 'dark:bg-indigo-500', 'text-white', 'border-transparent');
      } else {
        btn.className = btn.className
          .replace(/bg-indigo-[^\s]+/g, '')
          .replace(/dark:bg-indigo-[^\s]+/g, '')
          .replace(/text-white/g, '')
          .replace(/border-transparent/g, '');
        btn.classList.add('bg-zinc-50', 'dark:bg-zinc-950', 'text-zinc-600', 'dark:text-zinc-300', 'border-zinc-200', 'dark:border-zinc-800');
      }
    }

    // --- 日付整形関数 ---
    function formatJapaneseDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return '';
      const date = new Date(parts[0], parts[1] - 1, parts[2]);
      const months = date.getMonth() + 1;
      const day = date.getDate();
      const daysOfWeek = ['日', '月', '火', '水', '木', '金', '土'];
      const dayOfWeek = daysOfWeek[date.getDay()];
      return `${months}月${day}日（${dayOfWeek}）`;
    }

    // --- 文字列生成コア ---
    function generateTextLines() {
      // Line 1: 日付 ＋ TF回数・種類
      const datePart = formatJapaneseDate(state.dateStr);
      const tfPart = `${getOrdinal(state.tfCount)} ${state.tfType}`;
      const line1 = `${datePart}　　${tfPart}`;

      // Line 2: 試験種別＋回数
      const line2 = `${state.testType}${state.runCount}回目`;

      // Line 3: 後方の風
      let line3 = '後方の風：';
      if (state.rearWind.type === 'none') {
        line3 += '無風';
      } else if (state.rearWind.type === 'light') {
        line3 += `${state.rearWind.dir}から微風`;
      } else {
        const speedVal = document.getElementById('rear-speed-val').value || state.rearWind.speed;
        line3 += `${state.rearWind.dir}から風速${speedVal} m/s`;
      }

      // Line 4: 前方の風
      let line4 = '前方の風：';
      if (state.frontWind.type === 'none') {
        line4 += '無風';
      } else if (state.frontWind.type === 'light') {
        line4 += `${state.frontWind.dir}から微風`;
      } else {
        const speedVal = document.getElementById('front-speed-val').value || state.frontWind.speed;
        line4 += `${state.frontWind.dir}から風速${speedVal} m/s`;
      }

      return [line1, line2, line3, line4];
    }

    // プレビューの更新
    function updateOutput() {
      const lines = generateTextLines();
      const previewBox = document.getElementById('preview-box');
      previewBox.innerHTML = lines.map(line => `<div>${line}</div>`).join('');
      
      // 全画面表示中なら、中の文字を更新しフォントサイズを再調整
      const signboardOverlay = document.getElementById('signboard-overlay');
      if (!signboardOverlay.classList.contains('hidden')) {
        renderSignboardText();
        adjustFontSize();
      }
    }

    // --- 全画面カンペ文字描画 ---
    function renderSignboardText() {
      const lines = generateTextLines();
      const wrapper = document.getElementById('signboard-text-wrapper');
      
      // 画面はみ出しを確実に防ぐため、各行をwhite-space: nowrap (改行禁止) で包む
      wrapper.innerHTML = lines
        .map(line => `<span class="nowrap-line">${line}</span>`)
        .join('<div class="h-[0.25em]"></div>'); // 行間隔を程よく確保
    }

    // --- 全画面（カンペ）フォントサイズ自動調整ロジック (コア機能) ---
    function adjustFontSize() {
      const signboard = document.getElementById('signboard-overlay');
      // 全画面モードが開いていない場合は計算しない
      if (signboard.classList.contains('hidden')) return;

      const container = document.getElementById('signboard-text-container');
      const wrapper = document.getElementById('signboard-text-wrapper');

      // コンテナ（画面全体）の使用可能な最大サイズ (上下左右に少しマージンを持つ)
      const maxWidth = container.clientWidth * 0.94;
      const maxHeight = container.clientHeight * 0.88;

      // 二分探索法（Binary Search）による、はみ出さない最大のフォントサイズ算出
      let minSize = 4;   // 最小ピクセル
      let maxSize = 400; // 最大ピクセル (大画面デバイスにも追従できるように)
      let optimalSize = minSize;

      // 11回程度の反復で、0.2ピクセル未満の極めて高い精度で最適なサイズを瞬時に決定
      for (let i = 0; i < 11; i++) {
        const midSize = (minSize + maxSize) / 2;
        wrapper.style.fontSize = `${midSize}px`;

        // 実際の折り返し幅・高さを計測
        const actualWidth = wrapper.scrollWidth;
        const actualHeight = wrapper.scrollHeight;

        if (actualWidth <= maxWidth && actualHeight <= maxHeight) {
          optimalSize = midSize;
          minSize = midSize + 0.1; // もう少し大きくできるか試す
        } else {
          maxSize = midSize - 0.1; // はみ出たので小さくする
        }
      }

      // 決定した最適なフォントサイズを適用
      wrapper.style.fontSize = `${optimalSize}px`;
    }

    // --- 画面切り替え制御 ---
    function enterSignboardMode() {
      // データを描画
      renderSignboardText();

      // 全画面オーバーレイを表示
      const overlay = document.getElementById('signboard-overlay');
      overlay.classList.remove('hidden');

      // iOS Safariなどのアドレスバー格納対策として、一瞬遅らせてから正確なサイズで計算する
      setTimeout(() => {
        adjustFontSize();
      }, 50);

      // 画面タップガイダンスを一瞬表示してスッと消す
      const tip = document.getElementById('signboard-tip');
      tip.style.opacity = '1';
      setTimeout(() => {
        tip.style.opacity = '0';
      }, 2500);
    }

    function exitSignboardMode() {
      document.getElementById('signboard-overlay').classList.add('hidden');
    }

    // カンペモード単体でのコントラスト反転
    function toggleSignboardTheme() {
      const overlay = document.getElementById('signboard-overlay');
      if (overlay.classList.contains('bg-white')) {
        overlay.classList.remove('bg-white', 'text-zinc-950');
        overlay.classList.add('bg-black', 'text-white');
      } else {
        overlay.classList.remove('bg-black', 'text-white');
        overlay.classList.add('bg-white', 'text-zinc-950');
      }
      adjustFontSize();
    }

    // --- スマホ画面回転・リサイズ監視 ---
    window.addEventListener('resize', () => {
      adjustFontSize();
    });
    window.addEventListener('orientationchange', () => {
      setTimeout(adjustFontSize, 200); // 回転完了を待ってから再計算
    });
  </script>
</body>
